version: '3.9'
services:
  node-dev:
    user: ${UID}:${GID}
    build:
      context: .
      args:
        UID: ${UID}
        GID: ${GID}
        USERNAME: ${USERNAME}
      dockerfile: Dockerfile
    tty: true
    volumes:
      - ${APPDIR}:/app
    ports:
      - '${APPOLLO_DOCKER_PORT}:4000'
    command: >
      sh -c "npm install && 
             npm run build && 
             npm run dev && 
             npx prisma migrate dev --name sample &&
             npx prisma generate"
    restart: always
